<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Content Manager</title>
    <script>
      window.CMS_MANUAL_INIT = true;
    </script>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    <script>
      window.CMS.init({
        config: {
          load_config_file: false,
          backend: {
            name: "git-gateway",
            branch: "main"
          },
          media_folder: "assets/uploads",
          public_folder: "/assets/uploads",
          media_library: {
            name: "file"
          },
          site_url: "https://rainbow-mousse-dc53c8.netlify.app",
          collections: [
            {
              name: "products",
              label: "Products",
              folder: "content/products",
              create: true,
              slug: "{{slug}}",
              fields: [
                { label: "Name", name: "name", widget: "string" },
                { label: "Hero Image", name: "hero", widget: "image" },
                { label: "Description", name: "description", widget: "text" }
              ]
            },
            {
              name: "projects",
              label: "Projects",
              folder: "content/projects",
              create: true,
              slug: "{{slug}}",
              fields: [
                { label: "Title", name: "title", widget: "string" },
                { label: "Cover Image", name: "cover", widget: "image" },
                { label: "Body", name: "body", widget: "markdown" }
              ]
            },
            {
              name: "global",
              label: "Global Content",
              files: [
                {
                  name: "home",
                  label: "Homepage",
                  file: "content/home.md",
                  fields: [
                    { label: "Hero Title", name: "hero_title", widget: "string" },
                    { label: "Hero Subtitle", name: "hero_subtitle", widget: "string" },
                    { label: "Process Title", name: "process_title", widget: "string" },
                    { label: "Process Step 1", name: "process_step_1", widget: "string" },
                    { label: "Process Step 2", name: "process_step_2", widget: "string" },
                    { label: "Process Step 3", name: "process_step_3", widget: "string" }
                  ]
                }
              ]
            }
          ]
        }
      });
    </script>
  </body>
</html>
